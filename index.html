<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Расписание — ЦПВС Динамо Водный</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0e14;--bg1:#11151e;--bg2:#161b27;
  --border:#252d3d;--border2:#2e3a52;
  --txt:#e8edf5;--txt2:#8a9ab8;--txt3:#4a5a78;
  --accent:#4f8ef7;--green:#22c55e;--red:#f43f5e;--amber:#f59e0b;--purple:#a855f7;
}
body{background:var(--bg);color:var(--txt);font-family:Inter,system-ui,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

.hdr{position:sticky;top:0;z-index:100;background:var(--bg1);border-bottom:1px solid var(--border);padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo-text{font-weight:800;font-size:13px;letter-spacing:-.01em}
.logo-sub{font-size:10px;color:var(--txt3);margin-top:1px}
.live-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--green);font-weight:600;background:#22c55e12;border:1px solid #22c55e30;border-radius:99px;padding:4px 10px;flex-shrink:0}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.date-nav{background:var(--bg1);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.date-big{font-size:20px;font-weight:800;letter-spacing:-.02em;line-height:1.1}
.date-sub{font-size:12px;color:var(--txt3);margin-top:3px}
.clock{font-size:26px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;color:var(--accent);flex-shrink:0}

.day-tabs{display:flex;overflow-x:auto;gap:6px;padding:10px 16px;background:var(--bg1);border-bottom:1px solid var(--border);scrollbar-width:none}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{flex-shrink:0;padding:6px 14px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--txt3);cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;transition:all .12s;white-space:nowrap}
.day-tab:hover{color:var(--txt);border-color:var(--border2)}
.day-tab.active{background:#4f8ef718;color:var(--accent);border-color:#4f8ef740}

.content{max-width:680px;margin:0 auto;padding:14px 16px 40px}
.sec{font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.1em;margin:16px 0 8px}

.courts{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:5px;margin-bottom:6px}
.chip{border-radius:9px;padding:9px 4px;text-align:center;border:1px solid var(--border);background:var(--bg1)}
.chip.free{border-color:#22c55e28;background:#22c55e06}
.chip.busy{border-color:#f43f5e30;background:#f43f5e08}
.chip.soon{border-color:#f59e0b30;background:#f59e0b08}
.chip-n{font-size:12px;font-weight:700;color:var(--txt)}
.chip-s{font-size:9px;font-weight:700;margin-top:2px;text-transform:uppercase;letter-spacing:.04em}
.chip.free .chip-s{color:var(--green)}
.chip.busy .chip-s{color:var(--red)}
.chip.soon .chip-s{color:var(--amber)}

.list{display:flex;flex-direction:column;gap:6px}
.card{background:var(--bg1);border:1px solid var(--border);border-left:3px solid var(--border2);border-radius:10px;padding:12px 14px}
.card.now{border-left-color:var(--accent);background:#4f8ef708}
.card.past{opacity:.5}
.card.cancelled{opacity:.4;border-left-color:var(--purple)}
.card.absent{opacity:.35;border-left-color:var(--red)}

.crow{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.cleft{min-width:0;flex:1}
.ctime{font-size:17px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1}
.ctime span{font-size:13px;font-weight:500;color:var(--txt3);margin-left:6px}
.cname{font-size:14px;font-weight:700;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.csub{font-size:12px;color:var(--txt3);margin-top:2px}
.cright{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.badge{border-radius:99px;padding:2px 9px;font-size:11px;font-weight:600;white-space:nowrap}
.bnow{background:#4f8ef720;color:var(--accent);border:1px solid #4f8ef740}
.bpast{color:var(--txt3);border:1px solid var(--border)}
.bcancel{background:#a855f720;color:var(--purple);border:1px solid #a855f740}
.babsent{background:#f43f5e18;color:var(--red);border:1px solid #f43f5e40}
.bpresent{background:#22c55e18;color:var(--green);border:1px solid #22c55e40}
.borg{background:#f59e0b14;color:var(--amber);border:1px solid #f59e0b30}

.empty{text-align:center;padding:40px 24px;color:var(--txt3)}
.setup{background:var(--bg1);border:1px solid var(--border2);border-radius:12px;padding:24px;margin:16px 0}
.setup h2{font-size:16px;font-weight:700;margin-bottom:8px}
.setup p{font-size:13px;color:var(--txt2);line-height:1.7;margin-bottom:14px}
.inp{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--txt);font-family:inherit;font-size:13px;padding:10px 12px;outline:none;margin-bottom:8px}
.inp:focus{border-color:var(--accent)}
.btn{cursor:pointer;border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;padding:10px 18px}
.bp{background:var(--accent);color:#fff}
.note{font-size:11px;color:var(--txt3);text-align:center;margin-top:14px}
.card-actions{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px;padding-top:9px;border-top:1px solid var(--border)}
.act-btn{cursor:pointer;border:none;border-radius:99px;font-family:inherit;font-size:11px;font-weight:600;padding:4px 12px;transition:all .12s}
.act-present{background:#22c55e18;color:var(--green);border:1px solid #22c55e30}
.act-present:hover{background:#22c55e28}
.act-absent{background:#f43f5e16;color:var(--red);border:1px solid #f43f5e30}
.act-absent:hover{background:#f43f5e28}
.act-cancel{background:#a855f716;color:var(--purple);border:1px solid #a855f730}
.act-cancel:hover{background:#a855f726}
.act-clear{background:var(--bg2);color:var(--txt3);border:1px solid var(--border)}
.act-clear:hover{background:var(--bg3)}

@media(min-width:640px){.content{padding:20px 24px 60px}.hdr,.date-nav,.day-tabs{padding-left:24px;padding-right:24px}}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="logo-text">🏐 ЦПВС Динамо Водный Стадион</div>
    <div class="logo-sub">Ленинградское ш. вл. 39 · 07:00–23:00</div>
  </div>
  <div class="live-pill"><span class="live-dot"></span>Live</div>
</div>

<div class="date-nav">
  <div>
    <div class="date-big" id="date-big">—</div>
    <div class="date-sub" id="date-sub">Расписание</div>
  </div>
  <div class="clock" id="clock">—:—</div>
</div>

<div class="day-tabs" id="day-tabs"></div>

<div class="content">
  <div id="setup-block" style="display:none">
    <div class="setup">
      <h2>🔗 Подключение</h2>
      <p>Введи Bin ID из настроек основного приложения (JSONBin). Делается один раз.</p>
      <input class="inp" id="b-inp" placeholder="Bin ID">
      <input class="inp" id="k-inp" placeholder="Master Key (если бин приватный)">
      <button class="btn bp" onclick="saveCfg()">Подключить</button>
    </div>
  </div>
  <div id="main-block" style="display:none">
    <div class="sec" id="ct-title" style="display:none">Корты сейчас</div>
    <div class="courts" id="ct-grid"></div>
    <div class="sec">Расписание</div>
    <div class="list" id="sched"></div>
    <div class="note">Обновляется каждые 60 сек</div>
  </div>
  <div id="load-block" style="text-align:center;padding:48px;color:var(--txt3)">Загрузка…</div>
</div>

<script>
const DOW=["вс","пн","вт","ср","чт","пт","сб"];
const DOWF=["воскресенье","понедельник","вторник","среда","четверг","пятница","суббота"];
const MN=["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];
const MNS=["янв","фев","мар","апр","май","июн","июл","авг","сен","окт","ноя","дек"];
const COURTS=[{id:1,n:"К1"},{id:2,n:"К2"},{id:3,n:"К3"},{id:4,n:"К4"},{id:5,n:"К5"},{id:6,n:"К6"},{id:7,n:"К7"},{id:8,n:"К8"},{id:9,n:"К9"},{id:10,n:"К10"},{id:11,n:"Фт",fb:1}];

let gData=null, selDate=ds(new Date());

function ds(d){return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())}
function p(n){return String(n).padStart(2,"0")}
function addD(s,n){const d=new Date(s+"T00:00:00");d.setDate(d.getDate()+n);return ds(d)}
function t2m(t){if(!t)return 0;const[h,m]=t.split(":").map(Number);return h*60+(m||0)}
function norm(t){const m=t2m(t);return m===0?1440:m}
function m2t(m){if(m>=1440)return"00:00";return p(Math.floor(m/60))+":"+p(m%60)}

function slDates(sl){
  if(sl.specificDates&&sl.specificDates.length){
    const ex=sl.excludeDates||[];
    return sl.specificDates.filter(d=>!ex.includes(d)).sort();
  }
  if(!sl.startDate||!sl.endDate||!sl.dow||!sl.dow.length)return[];
  const out=[],ex=sl.excludeDates||[];
  let c=new Date(sl.startDate+"T00:00:00");
  const e=new Date(sl.endDate+"T00:00:00");
  while(c<=e){
    if(sl.dow.includes(c.getDay())){const dk=ds(c);if(!ex.includes(dk))out.push(dk);}
    c.setDate(c.getDate()+1);
  }
  return out;
}
function slotsOn(bk,date){return(bk.slots||[]).filter(sl=>slDates(sl).includes(date))}
function sessStatus(bk,date){
  const ss=(bk.sessions||[]).filter(s=>s.date===date);
  if(ss.some(s=>s.status==="cancel_client"||s.status==="cancel_club"||s.status==="moved"))return"cancel";
  if(ss.some(s=>s.status==="absent"))return"absent";
  if(ss.some(s=>s.status==="present"))return"present";
  return null;
}

// ── НАСТРОЙКИ ─────────────────────────────────────────────────────────────
// Вставь сюда свои данные из JSONBin один раз:
const HARDCODED_BIN_ID  = "69bf9eeab7ec241ddc8f455e";
const HARDCODED_API_KEY = "$2a$10$Y7srX2ZExEZK0kzTvqtC8em/HWRwE2nOiMIR95k/w/nwAcM4Ptlt6";
// ──────────────────────────────────────────────────────────────────────────

function getCfg(){
  // Сначала проверяем вшитые значения, потом localStorage
  if(HARDCODED_BIN_ID) return {binId:HARDCODED_BIN_ID, apiKey:HARDCODED_API_KEY};
  try{return JSON.parse(localStorage.getItem("DV_SCHEDULE_CFG")||"{}")}catch(e){return{}}
}
function saveCfg(){
  const b=document.getElementById("b-inp").value.trim();
  const k=document.getElementById("k-inp").value.trim();
  if(!b){alert("Введи Bin ID");return}
  localStorage.setItem("DV_SCHEDULE_CFG",JSON.stringify({binId:b,apiKey:k}));
  init();
}

function updateClock(){
  const n=new Date();
  document.getElementById("clock").textContent=p(n.getHours())+":"+p(n.getMinutes());
}

function setHeader(date){
  const d=new Date(date+"T00:00:00");
  const today=ds(new Date());
  const isT=date===today,isYes=date===addD(today,1);
  let prefix="";
  if(isT)prefix="Сегодня · ";
  else if(isYes)prefix="Завтра · ";
  const dow=DOWF[d.getDay()];
  document.getElementById("date-big").textContent=d.getDate()+" "+MN[d.getMonth()]+(isT||isYes?"":" · "+dow[0].toUpperCase()+dow.slice(1));
  document.getElementById("date-sub").textContent=prefix+dow[0].toUpperCase()+dow.slice(1);
}

function buildTabs(data){
  const today=ds(new Date());
  const days=[];
  for(let i=-1;i<=14;i++){
    const d=addD(today,i);
    if((data.bookings||[]).some(b=>slotsOn(b,d).length>0)||i===0)days.push(d);
  }
  const el=document.getElementById("day-tabs");
  el.innerHTML="";
  days.forEach(d=>{
    const dt=new Date(d+"T00:00:00");
    const isT=d===today,isY=d===addD(today,1);
    const label=isT?"Сегодня":isY?"Завтра":dt.getDate()+" "+MNS[dt.getMonth()]+" · "+DOW[dt.getDay()];
    const btn=document.createElement("button");
    btn.className="day-tab"+(isT?" today":"")+(d===selDate?" active":"");
    btn.textContent=label;
    btn.onclick=()=>{
      selDate=d;
      document.querySelectorAll(".day-tab").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      renderDay(data,d);
    };
    el.appendChild(btn);
  });
}

function renderDay(data,date){
  setHeader(date);
  const isToday=date===ds(new Date());
  const now=new Date(),nowM=now.getHours()*60+now.getMinutes();

  const bks=(data.bookings||[]).filter(b=>slotsOn(b,date).length>0).sort((a,b)=>{
    const am=Math.min(...slotsOn(a,date).map(s=>t2m(s.timeStart)));
    const bm=Math.min(...slotsOn(b,date).map(s=>t2m(s.timeStart)));
    return am-bm;
  });

  // Courts (today only)
  const ctTitle=document.getElementById("ct-title");
  const ctGrid=document.getElementById("ct-grid");
  if(isToday&&bks.length){
    ctTitle.style.display="block";ctGrid.style.display="grid";
    const busy={},next={};
    bks.forEach(b=>{
      const st=sessStatus(b,date);
      if(st==="cancel"||st==="absent")return;
      slotsOn(b,date).forEach(sl=>{
        const ts=t2m(sl.timeStart),te=norm(sl.timeEnd);
        (sl.courts||[]).forEach(cid=>{
          if(nowM>=ts&&nowM<te){busy[cid]={name:b.clientName,te};}
          else if(ts>nowM&&(!next[cid]||ts<next[cid].ts)){next[cid]={name:b.clientName,ts,te};}
        });
      });
    });
    ctGrid.innerHTML="";
    COURTS.forEach(ct=>{
      const b=busy[ct.id],nx=next[ct.id];
      const state=b?"busy":nx?"soon":"free";
      const statusText=b?"играет":nx?m2t(nx.ts):"своб";
      const div=document.createElement("div");
      div.className="chip "+state;
      div.innerHTML=`<div class="chip-n">${ct.fb?"⚽ ":""}${ct.n}</div><div class="chip-s">${statusText}</div>`;
      if(b)div.title=b.name+" до "+m2t(b.te);
      else if(nx)div.title=nx.name+" в "+m2t(nx.ts);
      ctGrid.appendChild(div);
    });
  } else {
    ctTitle.style.display="none";ctGrid.style.display="none";
  }

  // Schedule
  const list=document.getElementById("sched");
  list.innerHTML="";
  if(!bks.length && !orgs.length){
    list.innerHTML='<div class="empty">🏖️<br><br>На этот день броней нет</div>';
    return;
  }
  if(!bks.length){list.innerHTML="";}
  bks.forEach(b=>{
    const slots=slotsOn(b,date);
    const firstM=Math.min(...slots.map(s=>t2m(s.timeStart)));
    const lastM=Math.max(...slots.map(s=>norm(s.timeEnd)));
    const isNow=isToday&&nowM>=firstM&&nowM<lastM;
    const isPast=isToday&&nowM>=lastM;
    const st=sessStatus(b,date);

    let cls="card";
    if(st==="cancel")cls+=" cancelled";
    else if(st==="absent")cls+=" absent";
    else if(isNow)cls+=" now";
    else if(isPast)cls+=" past";

    const courtsStr=slots.map(sl=>{
      const cn=(sl.courts||[]).map(id=>{const ct=COURTS.find(c=>c.id===id);return ct?ct.n:"К"+id;}).join("+");
      return cn+" · "+sl.timeStart+"–"+sl.timeEnd;
    }).join("  |  ");

    const dur=lastM-firstM;
    const durStr=dur>=60?Math.floor(dur/60)+"ч"+(dur%60?dur%60+"м":""):dur+"м";

    let badge="";
    if(st==="cancel")badge='<span class="badge bcancel">отмена</span>';
    else if(st==="absent")badge='<span class="badge babsent">не пришёл</span>';
    else if(st==="present")badge='<span class="badge bpresent">✓ был</span>';
    else if(isNow)badge='<span class="badge bnow">● сейчас</span>';
    else if(isPast)badge='<span class="badge bpast">завершено</span>';

    const orgB=b.isOrg?'<span class="badge borg">юр</span>':"";

    const card=document.createElement("div");
    card.className=cls;
    const endH=Math.floor(lastM>=1440?0:lastM/60),endMi=lastM>=1440?0:lastM%60;
    const bkIdVal = b.id;
    const dateVal = date;
    card.innerHTML=`<div class="crow">
      <div class="cleft">
        <div class="ctime">${p(Math.floor(firstM/60))}:${p(firstM%60)}<span>– ${p(endH)}:${p(endMi)}</span></div>
        <div class="cname">${b.clientName}</div>
        <div class="csub">${courtsStr} · ${durStr}</div>
      </div>
      <div class="cright">${badge}${orgB}</div>
    </div>
    <div class="card-actions">
      <button class="act-btn act-present" onclick="handleSess('${bkIdVal}','${dateVal}','present')">✅ Был</button>
      <button class="act-btn act-absent" onclick="handleSess('${bkIdVal}','${dateVal}','absent')">❌ Не был</button>
      <button class="act-btn act-cancel" onclick="handleSess('${bkIdVal}','${dateVal}','cancel_client')">🔄 Отмена</button>
      ${st ? `<button class="act-btn act-clear" onclick="handleSess('${bkIdVal}','${dateVal}',null)">✕ Сброс</button>` : ''}
    </div>`;
    list.appendChild(card);
  });
}

function handleSess(bkId, date, status) {
  saveSessStatus(bkId, date, status);
}

async function saveSessStatus(bkId, date, status) {
  const cfg = getCfg();
  if (!cfg.binId || !cfg.apiKey) return;
  try {
    // Load latest data
    const r1 = await fetch("https://api.jsonbin.io/v3/b/" + cfg.binId + "/latest",
      {headers:{"X-Master-Key":cfg.apiKey}});
    const d1 = await r1.json();
    const data = d1.record || d1;
    // Find booking and update session
    const bks = (data.bookings||[]).map(b => {
      if (b.id !== bkId) return b;
      const sessions = (b.sessions||[]).filter(s => !(s.date===date));
      if (status) sessions.push({date, slotId: (b.slots&&b.slots[0]&&b.slots[0].id)||"", status});
      return {...b, sessions};
    });
    // Save back
    await fetch("https://api.jsonbin.io/v3/b/" + cfg.binId,
      {method:"PUT", headers:{"Content-Type":"application/json","X-Master-Key":cfg.apiKey},
       body: JSON.stringify({...data, bookings:bks})});
    // Refresh
    await fetchData();
  } catch(e) { console.error(e); }
}

async function fetchData(){
  const cfg=getCfg();
  if(!cfg.binId){
    document.getElementById("load-block").style.display="none";
    document.getElementById("setup-block").style.display="block";
    return;
  }
  // Hide setup block if we have config
  document.getElementById("setup-block").style.display="none";
  try{
    const h={"Content-Type":"application/json"};
    if(cfg.apiKey)h["X-Master-Key"]=cfg.apiKey;
    const r=await fetch("https://api.jsonbin.io/v3/b/"+cfg.binId+"/latest",{headers:h});
    if(!r.ok)throw new Error("HTTP "+r.status);
    const d=await r.json();
    const data=d.record||d;
    gData=data;
    document.getElementById("load-block").style.display="none";
    document.getElementById("main-block").style.display="block";
    buildTabs(data);
    renderDay(data,selDate);
  }catch(e){
    document.getElementById("load-block").textContent="Ошибка: "+e.message+". Проверь Bin ID.";
  }
}

function init(){
  document.getElementById("setup-block").style.display="none";
  document.getElementById("load-block").style.display="block";
  document.getElementById("main-block").style.display="none";
  fetchData();
}

// URL params
const params=new URLSearchParams(location.search);
if(params.get("bin")){
  const ex=getCfg();
  if(!ex.binId||ex.binId!==params.get("bin")){
    localStorage.setItem("DV_SCHEDULE_CFG",JSON.stringify({binId:params.get("bin"),apiKey:params.get("key")||""}));
  }
}

updateClock();
setInterval(updateClock,15000);
setInterval(()=>{if(getCfg().binId)fetchData();},60000);
init();
</script>
</body>
</html>
